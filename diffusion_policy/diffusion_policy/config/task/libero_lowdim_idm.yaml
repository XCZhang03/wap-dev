name: libero_idm

shape_meta: &shape_meta
  # acceptable types: pos, rot, qpos
  obs:
    robot0_eef_pos:
      shape: [3]
      type: pos
    robot0_gripper_qpos:
      shape: [2]
      type: qpos
    robot0_eef_quat:
      shape: [4]
      type: rot
  action: 
    shape: [7]

benchmark_name: &benchmark_name libero_object
task_indices: &task_indices 0-9
abs_action: &abs_action False

