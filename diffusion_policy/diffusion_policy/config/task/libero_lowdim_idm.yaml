dataset:
  _target_: diffusion_policy.dataset.libero_lowdim_idm_dataset.LIBEROLowdimIDMDataset
  shape_meta: *shape_meta
  benchmark_name: *benchmark_name
  task_indices: *task_indices
  horizon: ${eval:'${n_action_steps}+1'}
  pad_before: 0
  pad_after: 0
  n_obs_steps: null
  rotation_rep: 'rotation_6d'
  use_legacy_normalizer: False
  use_cache: True
  seed: 42
  val_ratio: 0.02
  num_demos_per_task: null
